<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HEBBS Memory Palace</title>
  <link rel="stylesheet" href="/static/panel.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 100 100">
            <circle cx="35" cy="50" r="18" fill="#F59E0B" opacity="0.9"/>
            <circle cx="65" cy="50" r="18" fill="#F59E0B" opacity="0.6"/>
          </svg>
          <span class="logo-text">HEBBS Memory</span>
        </div>
        <select id="vault-select" class="vault-dropdown"></select>
      </div>
      <div class="header-right">
        <button id="export-png" class="header-btn" title="Export as PNG">Export PNG</button>
      </div>
    </header>

    <nav id="tab-bar" class="tab-bar">
      <button class="tab-btn" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="notes">Notes</button>
      <button class="tab-btn" data-tab="explorer">Explorer</button>
      <button class="tab-btn" data-tab="recall">Recall</button>
      <button class="tab-btn active" data-tab="brain">Brain</button>
      <button class="tab-btn" data-tab="queries">Queries</button>
      <button class="tab-btn" data-tab="timeline">Timeline</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </nav>

    <!-- ── Dashboard Tab ──────────────────────────────────────────── -->
    <div id="tab-dashboard" class="tab-pane" style="display:none">
      <div id="dashboard-content" class="dashboard-layout">
        <div class="dash-loading">Loading dashboard...</div>
      </div>
      <div class="detail-drawer hidden">
        <div class="detail-drawer-header">
          <div class="detail-drawer-breadcrumbs"></div>
          <button class="detail-drawer-close">&times;</button>
        </div>
        <div class="detail-drawer-content"></div>
      </div>
    </div>

    <!-- ── Notes Tab ────────────────────────────────────────────── -->
    <div id="tab-notes" class="tab-pane" style="display:none">
      <div class="notes-layout">
        <aside class="notes-sidebar">
          <div class="notes-sidebar-header">
            <input id="notes-file-search" type="text" placeholder="Filter files..." class="search-input notes-search-input">
          </div>
          <div id="notes-file-list" class="notes-file-list"></div>
        </aside>
        <div class="notes-main">
          <div id="notes-empty" class="notes-empty-state">
            <div class="notes-empty-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
              </svg>
            </div>
            <p>Select a file to view its contents and linked memories</p>
          </div>
          <div id="notes-content" class="notes-content" style="display:none">
            <div id="notes-file-header" class="notes-file-header"></div>
            <div id="notes-rendered" class="notes-rendered markdown-body"></div>
          </div>
        </div>
        <div id="notes-memory-panel" class="notes-memory-panel" style="display:none">
          <div class="notes-memory-panel-header">
            <span id="notes-memory-title">Memory Details</span>
            <button id="notes-memory-close" class="detail-drawer-close">&times;</button>
          </div>
          <div id="notes-memory-content" class="notes-memory-content"></div>
        </div>
      </div>
    </div>

    <!-- ── Explorer Tab ───────────────────────────────────────────── -->
    <div id="tab-explorer" class="tab-pane" style="display:none">
      <div class="explorer-toolbar">
        <input id="explorer-search" type="text" placeholder="Search memories..." class="search-input explorer-search-input">
        <select id="explorer-filter-state" class="filter-select">
          <option value="">All states</option>
          <option value="synced">Synced</option>
          <option value="stale">Stale</option>
          <option value="orphaned">Orphaned</option>
        </select>
        <select id="explorer-filter-file" class="filter-select">
          <option value="">All files</option>
        </select>
        <select id="explorer-sort" class="filter-select">
          <option value="created_at">Newest</option>
          <option value="importance">Importance</option>
          <option value="recency">Recency</option>
          <option value="decay_score">Decay</option>
          <option value="access_count">Most accessed</option>
          <option value="label">Name</option>
        </select>
        <span id="explorer-count" class="explorer-count"></span>
      </div>
      <div id="explorer-list" class="explorer-list"></div>
      <div id="explorer-pagination" class="explorer-pagination"></div>
      <div class="detail-drawer hidden">
        <div class="detail-drawer-header">
          <div class="detail-drawer-breadcrumbs"></div>
          <button class="detail-drawer-close">&times;</button>
        </div>
        <div class="detail-drawer-content"></div>
      </div>
    </div>

    <!-- ── Recall Tab ─────────────────────────────────────────────── -->
    <div id="tab-recall" class="tab-pane" style="display:none">
      <div class="recall-layout">
        <div class="recall-controls">
          <div class="recall-query-row">
            <input id="recall-query" type="text" placeholder="Enter a query to recall memories..." class="search-input recall-query-input">
            <button id="recall-run" class="config-save-btn">Run Recall</button>
          </div>
          <div class="recall-params">
            <div class="recall-strategies">
              <label class="recall-strat"><input type="checkbox" id="recall-strat-similarity" checked> Similarity</label>
              <label class="recall-strat"><input type="checkbox" id="recall-strat-temporal" checked> Temporal</label>
              <label class="recall-strat"><input type="checkbox" id="recall-strat-causal"> Causal</label>
              <label class="recall-strat"><input type="checkbox" id="recall-strat-analogical"> Analogical</label>
              <select id="recall-topk" class="top-k-select">
                <option value="5">Top 5</option>
                <option value="10" selected>Top 10</option>
                <option value="20">Top 20</option>
                <option value="50">Top 50</option>
              </select>
            </div>
            <div class="recall-weights">
              <div class="slider-row">
                <label>Relevance</label>
                <input type="range" id="recall-w-relevance" min="0" max="100" value="50" class="weight-slider">
                <span class="slider-val" id="recall-w-relevance-val">0.50</span>
              </div>
              <div class="slider-row">
                <label>Recency</label>
                <input type="range" id="recall-w-recency" min="0" max="100" value="20" class="weight-slider">
                <span class="slider-val" id="recall-w-recency-val">0.20</span>
              </div>
              <div class="slider-row">
                <label>Importance</label>
                <input type="range" id="recall-w-importance" min="0" max="100" value="20" class="weight-slider">
                <span class="slider-val" id="recall-w-importance-val">0.20</span>
              </div>
              <div class="slider-row">
                <label>Reinforcement</label>
                <input type="range" id="recall-w-reinforcement" min="0" max="100" value="10" class="weight-slider">
                <span class="slider-val" id="recall-w-reinforcement-val">0.10</span>
              </div>
            </div>
            <div class="recall-presets">
              <button class="preset-btn" data-preset="relevance">Pure relevance</button>
              <button class="preset-btn" data-preset="recency">Recency boost</button>
              <button class="preset-btn" data-preset="importance">High importance</button>
            </div>
          </div>
        </div>
        <div id="recall-results" class="recall-results">
          <div class="recall-empty">Enter a query and click Run Recall to search your memories.</div>
        </div>
      </div>
      <div class="detail-drawer hidden">
        <div class="detail-drawer-header">
          <div class="detail-drawer-breadcrumbs"></div>
          <button class="detail-drawer-close">&times;</button>
        </div>
        <div class="detail-drawer-content"></div>
      </div>
    </div>

    <!-- ── Brain Tab ───────────────────────────────────────────────── -->
    <div id="tab-brain" class="tab-pane" style="display:flex">
      <main class="brain-main">
        <input id="brain-search-input" type="text" placeholder="Search memories..." class="brain-search-input">
        <span id="brain-latency-badge" class="latency-badge brain-latency-badge"></span>
        <canvas id="brain-canvas"></canvas>
        <div id="brain-side-panel" class="side-panel hidden">
          <button id="brain-side-panel-close" class="panel-close">&times;</button>
          <div id="brain-side-panel-content"></div>
        </div>
      </main>
    </div>

    <!-- ── Queries Tab (Query Audit Log) ─────────────────────────── -->
    <div id="tab-queries" class="tab-pane" style="display:none">
      <div class="queries-layout">
        <div class="queries-toolbar">
          <div class="queries-caller-chips" id="queries-caller-chips"></div>
          <div class="queries-filters">
            <select id="queries-filter-op" class="filter-select">
              <option value="">All operations</option>
              <option value="recall">Recall</option>
              <option value="prime">Prime</option>
            </select>
            <select id="queries-filter-time" class="filter-select">
              <option value="">All time</option>
              <option value="1h">Last hour</option>
              <option value="24h">Last 24h</option>
              <option value="7d">Last 7 days</option>
            </select>
            <input id="queries-search" type="text" placeholder="Search query text..." class="search-input queries-search-input">
          </div>
        </div>
        <div class="queries-stats" id="queries-stats"></div>
        <div id="queries-list" class="queries-list">
          <div class="recall-empty">Loading query log...</div>
        </div>
      </div>
      <div class="detail-drawer hidden">
        <div class="detail-drawer-header">
          <div class="detail-drawer-breadcrumbs"></div>
          <button class="detail-drawer-close">&times;</button>
        </div>
        <div class="detail-drawer-content"></div>
      </div>
    </div>

    <!-- ── Timeline Tab ───────────────────────────────────────────── -->
    <div id="tab-timeline" class="tab-pane" style="display:none">
      <div id="timeline-content" class="timeline-layout">
        <div class="dash-loading">Loading timeline...</div>
      </div>
      <div class="detail-drawer hidden">
        <div class="detail-drawer-header">
          <div class="detail-drawer-breadcrumbs"></div>
          <button class="detail-drawer-close">&times;</button>
        </div>
        <div class="detail-drawer-content"></div>
      </div>
    </div>

    <!-- ── Settings Tab ───────────────────────────────────────────── -->
    <div id="tab-settings" class="tab-pane" style="display:none">
      <div id="settings-content" class="settings-layout">
        <div class="dash-loading">Loading settings...</div>
      </div>
    </div>
  </div>

  <script type="module" src="/static/brain.js"></script>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
